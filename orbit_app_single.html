<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>나의 우주</title>
<style>
*{box-sizing:border-box;margin:0;padding:0} html,body,#app{width:100%;height:100%;overflow:hidden} body{font-family:'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif;background:radial-gradient(ellipse at 28% 38%,#1d1642 0%,#0f0c25 45%,#070518 100%);color:white} button,input,textarea{font-family:inherit}.root{width:100vw;height:100vh;overflow:hidden;position:relative;background:radial-gradient(ellipse at 28% 38%,#1d1642 0%,#0f0c25 45%,#070518 100%)}.stars{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0}.screen{width:100%;height:100%;position:relative;z-index:1}.home{display:flex;flex-direction:column;align-items:center;justify-content:center}.back{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);border-radius:11px;padding:7px 15px;color:rgba(255,255,255,.65);cursor:pointer;font-size:13px}.menu{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:272px}.menu-card{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:16px 14px;color:white;cursor:pointer;text-align:left;backdrop-filter:blur(14px);transition:.22s}.menu-card:active{transform:scale(.98)}.topbar{position:absolute;top:0;left:0;right:0;padding:18px 20px;display:flex;align-items:center;z-index:100}.title{flex:1;text-align:center;color:rgba(255,255,255,.4);font-size:14px}.field{width:100%;padding:13px 16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:13px;color:white;font-size:14px;outline:none}.field::placeholder,textarea::placeholder{color:rgba(255,255,255,.18)}.label{color:rgba(255,255,255,.35);font-size:11px;display:block;margin-bottom:8px;letter-spacing:.8px}.panel{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:15px}.btn-main{padding:15px;border-radius:14px;font-size:15px;font-weight:700;border:1px solid rgba(212,186,255,.4);background:rgba(212,186,255,.22);color:white;cursor:pointer}.btn-main:disabled{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.07);color:rgba(255,255,255,.22)}@keyframes floatPlanet{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}@keyframes floatAstro{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}@keyframes twinkle{0%,100%{opacity:var(--op)}50%{opacity:.08}}::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:2px}
</style>
</head>
<body><div id="app"></div>
<script>
const ORBIT_R_BASE=[112,182,252,322],ORBIT_SPEEDS=[.13,.09,.065,.045];
const orbitNames=["가장 가까운 곳","소중한 인연","느슨한 연결","기억 속 어딘가"];
const PASTEL=["#FFB3BA","#FFCBA4","#FFF4B3","#BAFFC9","#BAE1FF","#D4BAFF","#FFB3E6","#E0D4FF","#B3FFF0","#FFD4E8","#C8F0FF","#F0E8FF"];
let state={screen:'home',user:{name:'나',mbti:'INFP',color:'#D4BAFF'},friends:[{id:1,name:'민지',affiliation:'대학 친구',mbti:'ENFP',orbit:0,color:'#FFB3BA'},{id:2,name:'준호',affiliation:'직장 동료',mbti:'INTJ',orbit:1,color:'#BAE1FF'},{id:3,name:'서연',affiliation:'고등학교 친구',mbti:'ISFJ',orbit:2,color:'#BAFFC9'},{id:4,name:'다은',affiliation:'온라인 지인',mbti:'ENTP',orbit:3,color:'#FFCBA4'},{id:5,name:'현우',affiliation:'동네 친구',mbti:'INTP',orbit:1,color:'#D4BAFF'}],diaries:[],selected:null,angles:{},form:{name:'',affiliation:'',mbti:'INFP',orbit:0,color:PASTEL[0]},diary:{content:'',tags:[],result:null}};
state.friends.forEach((f,i)=>state.angles[f.id]=i*72);
const app=document.getElementById('app');
function dk(hex,amt=55){const n=parseInt(hex.replace('#',''),16);const c=v=>Math.max(0,v-amt).toString(16).padStart(2,'0');return '#'+c(n>>16)+c((n>>8)&255)+c(n&255)}
function planet(mbti='INFP',color='#D4BAFF',size=80,glow=false,pid='p'){let m=(mbti||'INFP').toUpperCase().padEnd(4,'X'),E=m[0]=='E',N=m[1]=='N',F=m[2]=='F',J=m[3]=='J',dark=dk(color),gid='g'+pid+Math.random().toString(36).slice(2,5),cid='c'+pid+Math.random().toString(36).slice(2,5);return `<svg width="${size}" height="${size}" viewBox="0 0 100 100" style="display:block;filter:${glow?`drop-shadow(0 0 22px ${color}) drop-shadow(0 0 8px ${color})`:`drop-shadow(0 0 7px ${color}99)`}"><defs><radialGradient id="${gid}" cx="38%" cy="32%" r="65%"><stop offset="0%" stop-color="#fff" stop-opacity=".68"/><stop offset="50%" stop-color="${color}"/><stop offset="100%" stop-color="${dark}"/></radialGradient><clipPath id="${cid}"><circle cx="50" cy="50" r="38"/></clipPath></defs><circle cx="50" cy="50" r="47" fill="${E?color:'#9ab0ff'}" opacity="${E?.15:.08}"/><circle cx="50" cy="50" r="38" fill="url(#${gid})"/><g clip-path="url(#${cid})">${N?`<polygon points="50,13 42,33 58,33" fill="#6b4030" opacity=".74"/><polygon points="50,13 46,22 54,22" fill="#503020" opacity=".6"/><circle cx="50" cy="12" r="4" fill="#ff7244" opacity=".92"/><ellipse cx="50" cy="10" rx="6.5" ry="3" fill="#ffaa66" opacity=".55"/>`:`<polygon points="50,17 43,33 57,33" fill="#888080" opacity=".44"/><polygon points="50,17 47,25 53,25" fill="#686060" opacity=".36"/>`}${F?`<ellipse cx="26" cy="53" rx="10" ry="6" fill="white" opacity=".42"/><ellipse cx="30" cy="50" rx="8" ry="5" fill="white" opacity=".36"/><ellipse cx="74" cy="61" rx="9" ry="5.5" fill="white" opacity=".3"/><ellipse cx="70" cy="58" rx="7" ry="4" fill="white" opacity=".26"/>`:`<ellipse cx="50" cy="55" rx="36" ry="9" fill="none" stroke="rgba(160,205,255,.3)" stroke-width="1.5"/><ellipse cx="50" cy="62" rx="31" ry="7" fill="none" stroke="rgba(160,205,255,.2)"/><ellipse cx="50" cy="68" rx="24" ry="5" fill="none" stroke="rgba(160,205,255,.12)" stroke-width=".8"/>`}${J?[16,26,36,55,65].map(x=>`<rect x="${x}" y="66" width="9" height="4" rx="1.5" fill="#8a7050" opacity=".4"/><rect x="${x+.5}" y="71" width="8" height="3.5" rx="1" fill="#7a6040" opacity=".3"/>`).join(''):[19,25,31,57,63,69].map(x=>`<line x1="${x}" y1="68" x2="${x-2}" y2="60" stroke="#7ec8a0" stroke-width="1.5" opacity=".55"/><line x1="${x+3}" y1="68" x2="${x+5}" y2="59" stroke="#60c090" stroke-width="1.5" opacity=".44"/>`).join('')}</g><ellipse cx="37" cy="37" rx="9" ry="6" fill="white" opacity=".26" transform="rotate(-15 37 37)"/><ellipse cx="34" cy="34" rx="4.5" ry="3" fill="white" opacity=".44" transform="rotate(-15 34 34)"/></svg>`}
function astronaut(){return `<svg width="54" height="54" viewBox="0 0 60 60"><ellipse cx="30" cy="43" rx="14" ry="14" fill="#ddddf2"/><ellipse cx="30" cy="43" rx="10" ry="10" fill="#c8c8e2" opacity=".7"/><circle cx="30" cy="21" r="14" fill="#c0c0e0"/><circle cx="30" cy="21" r="11" fill="#6890b8" opacity=".7"/><ellipse cx="26" cy="17" rx="4" ry="3" fill="white" opacity=".4"/><ellipse cx="17" cy="41" rx="5.5" ry="11" fill="#cccce2" transform="rotate(-18 17 41)"/><ellipse cx="43" cy="41" rx="5.5" ry="11" fill="#cccce2" transform="rotate(18 43 41)"/><ellipse cx="25" cy="57" rx="5.5" ry="6.5" fill="#b8b8d2"/><ellipse cx="35" cy="57" rx="5.5" ry="6.5" fill="#b8b8d2"/></svg>`}
function stars(){let s='';for(let i=0;i<100;i++){let x=Math.random()*100,y=Math.random()*100,r=Math.random()*1.7+.3,op=Math.random()*.5+.2,d=Math.random()*3+2;s+=`<circle cx="${x}%" cy="${y}%" r="${r}" fill="white" style="--op:${op};animation:twinkle ${d}s infinite ${Math.random()*6}s"/>`}return `<svg class="stars"><defs><radialGradient id="neb1" cx="25%" cy="35%"><stop offset="0%" stop-color="#3a1a6e" stop-opacity=".45"/><stop offset="100%" stop-color="transparent"/></radialGradient><radialGradient id="neb2" cx="75%" cy="65%"><stop offset="0%" stop-color="#1a3a5e" stop-opacity=".35"/><stop offset="100%" stop-color="transparent"/></radialGradient></defs><ellipse cx="25%" cy="35%" rx="420" ry="320" fill="url(#neb1)"/><ellipse cx="75%" cy="65%" rx="360" ry="270" fill="url(#neb2)"/>${s}</svg>`}
const starHTML=stars();
function render(){let html=`<div class="root">${starHTML}`; if(state.screen==='home')html+=home(); if(state.screen==='orbit')html+=orbit(); if(state.screen==='diary')html+=diary(); if(state.screen==='add')html+=add(); if(state.screen==='list')html+=list(); app.innerHTML=html+'</div>'; bind()}
function home(){return `<div class="screen home"><div style="position:relative;margin-bottom:28px"><div style="animation:floatPlanet 4s ease-in-out infinite">${planet(state.user.mbti,state.user.color,158,true,'home')}</div><div style="position:absolute;bottom:86%;left:50%;margin-left:-27px;animation:floatAstro 3.5s ease-in-out infinite .7s">${astronaut()}</div></div><h1 style="font-size:22px;margin-bottom:5px">나의 우주</h1><p style="color:rgba(255,255,255,.28);font-size:12px;margin-bottom:32px;letter-spacing:2px">${state.user.mbti}</p><div class="menu"><button class="menu-card" data-nav="orbit"><div style="font-size:22px;margin-bottom:8px">🌌</div><b>궤도 보기</b><div style="font-size:11px;opacity:.35;margin-top:3px">관계의 지도</div></button><button class="menu-card" data-nav="diary"><div style="font-size:22px;margin-bottom:8px">📓</div><b>일기 쓰기</b><div style="font-size:11px;opacity:.35;margin-top:3px">오늘의 기록</div></button><button class="menu-card" data-nav="list"><div style="font-size:22px;margin-bottom:8px">📚</div><b>일기 목록</b><div style="font-size:11px;opacity:.35;margin-top:3px">지난 기억들</div></button><button class="menu-card" data-nav="add"><div style="font-size:22px;margin-bottom:8px">🪐</div><b>행성 추가</b><div style="font-size:11px;opacity:.35;margin-top:3px">새로운 인연</div></button></div></div>`}
function orbit(){let min=Math.min(innerWidth,innerHeight),f=Math.min(1,min*.44/322),rs=ORBIT_R_BASE.map(r=>r*f);let items=rs.map((r,i)=>`<div style="position:absolute;width:${r*2}px;height:${r*2}px;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;border:1px solid rgba(180,200,255,.12);pointer-events:none"><div style="position:absolute;top:-20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.2);font-size:10px;white-space:nowrap">${orbitNames[i]}</div></div>`).join('');items+=`<div style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:10">${planet(state.user.mbti,state.user.color,74,true,'center')}</div>`;state.friends.forEach(fr=>{let r=rs[fr.orbit],a=(state.angles[fr.id]||0)*Math.PI/180,x=r*Math.cos(a),y=r*Math.sin(a),sel=state.selected===fr.id;items+=`<div style="position:absolute;left:calc(50% + ${x}px - 21px);top:calc(50% + ${y}px - 21px);z-index:${sel?50:5}"><div data-select="${fr.id}" style="cursor:pointer;display:flex;flex-direction:column;align-items:center">${planet(fr.mbti,fr.color,42,sel,'fr'+fr.id)}<div style="color:rgba(255,255,255,.52);font-size:9px;margin-top:3px;white-space:nowrap">${fr.name}</div></div>${sel?popup(fr,y):''}</div>`});return `<div class="screen" data-clear="1"><div class="topbar"><button class="back" data-nav="home">← 홈</button><div class="title">궤도 지도</div><div style="width:64px"></div></div><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">${items}</div></div>`}
function popup(f,y){return `<div style="position:absolute;${y<20?'top':'bottom'}:108%;left:50%;transform:translateX(-50%);background:rgba(9,7,21,.94);backdrop-filter:blur(22px);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:16px 18px;min-width:172px;z-index:60;animation:fadeUp .2s"><div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">${planet(f.mbti,f.color,32,false,'p'+f.id)}<div><div style="font-weight:700;font-size:15px">${f.name}</div><div style="color:rgba(255,255,255,.38);font-size:11px">${f.affiliation}</div></div></div><div style="display:flex;justify-content:space-between;margin-bottom:14px"><span style="color:${f.color};font-size:12px;font-weight:600">${f.mbti}</span><span style="color:rgba(255,255,255,.28);font-size:11px">${orbitNames[f.orbit]}</span></div><div style="display:flex;gap:8px"><button data-push="${f.id},in" ${f.orbit===0?'disabled':''} style="flex:1;padding:9px 0;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.16);border-radius:10px;color:white">← 가까이</button><button data-push="${f.id},out" ${f.orbit===3?'disabled':''} style="flex:1;padding:9px 0;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.16);border-radius:10px;color:white">멀리 →</button></div></div>`}
function diary(){let d=state.diary;return `<div class="screen" style="display:flex;flex-direction:column;align-items:center;padding:20px"><div style="width:100%;max-width:560px;display:flex;align-items:center;margin-bottom:22px"><button class="back" data-nav="home">← 홈</button><div class="title">오늘의 일기</div><div style="width:60px"></div></div><div style="width:100%;max-width:560px;flex:1;overflow:auto;display:flex;flex-direction:column;gap:14px;padding-bottom:28px"><textarea id="diaryText" placeholder="오늘 어떤 하루였나요? 어떤 생각이 들었나요..." style="width:100%;min-height:180px;padding:18px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:18px;color:white;font-size:14px;line-height:1.85;resize:vertical;outline:none">${d.content}</textarea><div class="panel"><div class="label">태그할 사람</div><div style="display:flex;flex-wrap:wrap;gap:8px">${state.friends.map(f=>`<button data-tag="${f.id}" style="padding:7px 13px;border-radius:20px;cursor:pointer;font-size:12px;background:${d.tags.includes(f.id)?f.color:'rgba(255,255,255,.07)'};border:1px solid ${d.tags.includes(f.id)?f.color:'rgba(255,255,255,.12)'};color:${d.tags.includes(f.id)?'#1a1530':'rgba(255,255,255,.6)'}">${f.name} <span style="opacity:.6;font-size:10px">${f.mbti}</span></button>`).join('')}</div></div><button class="btn-main" data-analyze>🔍 감정 분석하기</button>${d.result?resultBox(d.result):''}<button class="btn-main" data-save ${d.content.trim()?'':'disabled'}>저장하기</button></div></div>`}
function resultBox(r){let col={positive:'#BAFFC9',negative:'#FFB3BA',neutral:'#BAE1FF'}[r.sentiment],emo={positive:'✨ 따뜻한 감정',negative:'💭 무거운 감정',neutral:'🌙 차분한 감정'}[r.sentiment];return `<div style="background:rgba(255,255,255,.04);border:1px solid ${col}33;border-radius:16px;padding:18px;animation:fadeUp .3s"><div style="color:${col};font-size:13px;font-weight:600;margin-bottom:9px">${emo}</div><div style="color:rgba(255,255,255,.58);font-size:13px;line-height:1.75">${r.summary}</div></div>`}
function analyzeText(t){let pos=['좋','행복','기쁨','재밌','고마','설렘','편해','웃'],neg=['싫','짜증','힘들','슬픔','불안','화나','우울','피곤'];let p=pos.some(w=>t.includes(w)),n=neg.some(w=>t.includes(w));return {sentiment:p&&!n?'positive':n&&!p?'negative':'neutral',summary:p&&!n?'따뜻한 하루였어요':n&&!p?'조금 무거운 하루였어요':'차분한 기록이에요'}}
function add(){let f=state.form;return `<div class="screen" style="display:flex;flex-direction:column;align-items:center;padding:20px;overflow:auto"><div style="width:100%;max-width:480px"><div style="display:flex;align-items:center;margin-bottom:26px"><button class="back" data-nav="home">← 홈</button><div class="title">새 행성 등록</div><div style="width:60px"></div></div><div style="display:flex;justify-content:center;margin-bottom:26px"><div style="display:flex;flex-direction:column;align-items:center;gap:10px"><div style="animation:floatPlanet 3.5s infinite">${planet(f.mbti,f.color,90,true,'preview')}</div><div style="color:rgba(255,255,255,.45);font-size:12px">${f.name||'이름을 입력하세요'}</div></div></div><div style="display:flex;flex-direction:column;gap:14px"><div><label class="label">이름</label><input class="field" id="fname" value="${f.name}" placeholder="이름을 입력하세요"></div><div><label class="label">소속</label><input class="field" id="faff" value="${f.affiliation}" placeholder="예: 대학 친구, 직장 동료..."></div><div><label class="label">MBTI</label><div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px">${[['E','I'],['S','N'],['F','T'],['J','P']].map((pair,i)=>`<div style="display:flex;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,.12)">${pair.map(ch=>`<button data-mbti="${i},${ch}" style="flex:1;padding:10px 0;border:0;background:${f.mbti[i]===ch?'rgba(212,186,255,.28)':'rgba(255,255,255,.04)'};color:${f.mbti[i]===ch?'white':'rgba(255,255,255,.4)'}">${ch}</button>`).join('')}</div>`).join('')}</div></div><div><label class="label">행성 색상</label><div style="display:flex;gap:8px;flex-wrap:wrap">${PASTEL.map(c=>`<button data-color="${c}" style="width:30px;height:30px;border-radius:50%;background:${c};border:${f.color===c?'3px solid white':'3px solid transparent'}"></button>`).join('')}</div></div><div><label class="label">시작 궤도</label><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">${orbitNames.map((n,i)=>`<button data-forbit="${i}" style="padding:10px 8px;border-radius:10px;background:${f.orbit===i?'rgba(212,186,255,.22)':'rgba(255,255,255,.04)'};border:1px solid ${f.orbit===i?'rgba(212,186,255,.4)':'rgba(255,255,255,.1)'};color:${f.orbit===i?'white':'rgba(255,255,255,.4)'};font-size:11px">${n}</button>`).join('')}</div></div><button class="btn-main" data-addfriend ${f.name.trim()?'':'disabled'}>🪐 궤도에 올리기</button></div></div></div>`}
function list(){return `<div class="screen" style="display:flex;flex-direction:column;align-items:center;padding:20px"><div style="width:100%;max-width:520px"><div style="display:flex;align-items:center;margin-bottom:22px"><button class="back" data-nav="home">← 홈</button><div class="title">일기 목록</div><div style="width:60px"></div></div><div style="overflow:auto;max-height:calc(100vh - 100px);display:flex;flex-direction:column;gap:12px;padding-bottom:28px">${state.diaries.length?state.diaries.map(d=>`<div class="panel"><div style="display:flex;justify-content:space-between;margin-bottom:10px"><span style="color:#BAE1FF;font-size:13px">🌙 ${d.date}</span></div><p style="color:rgba(255,255,255,.55);font-size:13px;line-height:1.75">${d.content}</p></div>`).join(''):`<div style="text-align:center;color:rgba(255,255,255,.22);font-size:14px;margin-top:60px;line-height:2">아직 작성된 일기가 없어요<br>🌙</div>`}</div></div></div>`}
function bind(){document.querySelectorAll('[data-nav]').forEach(b=>b.onclick=e=>{state.screen=b.dataset.nav;state.selected=null;render()});document.querySelectorAll('[data-select]').forEach(b=>b.onclick=e=>{e.stopPropagation();state.selected=state.selected==+b.dataset.select?null:+b.dataset.select;render()});let clear=document.querySelector('[data-clear]');if(clear)clear.onclick=()=>{state.selected=null;render()};document.querySelectorAll('[data-push]').forEach(b=>b.onclick=e=>{e.stopPropagation();let[id,dir]=b.dataset.push.split(',');state.friends=state.friends.map(f=>f.id==id?{...f,orbit:dir==='in'?Math.max(0,f.orbit-1):Math.min(3,f.orbit+1)}:f);state.selected=null;render()});let txt=document.getElementById('diaryText');if(txt)txt.oninput=e=>{state.diary.content=e.target.value;render()};document.querySelectorAll('[data-tag]').forEach(b=>b.onclick=()=>{let id=+b.dataset.tag,t=state.diary.tags;state.diary.tags=t.includes(id)?t.filter(x=>x!==id):[...t,id];render()});let an=document.querySelector('[data-analyze]');if(an)an.onclick=()=>{state.diary.result=analyzeText(state.diary.content);render()};let sv=document.querySelector('[data-save]');if(sv)sv.onclick=()=>{let d=state.diary;if(!d.content.trim())return;let sent=d.result?.sentiment||'neutral';state.diaries.unshift({id:Date.now(),date:new Date().toLocaleDateString('ko-KR'),content:d.content,tags:d.tags,sentiment:sent});state.friends=state.friends.map(f=>d.tags.includes(f.id)?{...f,orbit:Math.max(0,Math.min(3,f.orbit+(sent==='positive'?-1:sent==='negative'?1:0)))}:f);state.diary={content:'',tags:[],result:null};state.screen='home';render()};let fn=document.getElementById('fname'),fa=document.getElementById('faff');if(fn)fn.oninput=e=>{state.form.name=e.target.value;render()};if(fa)fa.oninput=e=>{state.form.affiliation=e.target.value;render()};document.querySelectorAll('[data-mbti]').forEach(b=>b.onclick=()=>{let[i,ch]=b.dataset.mbti.split(',');let m=state.form.mbti.split('');m[i]=ch;state.form.mbti=m.join('');render()});document.querySelectorAll('[data-color]').forEach(b=>b.onclick=()=>{state.form.color=b.dataset.color;render()});document.querySelectorAll('[data-forbit]').forEach(b=>b.onclick=()=>{state.form.orbit=+b.dataset.forbit;render()});let af=document.querySelector('[data-addfriend]');if(af)af.onclick=()=>{if(!state.form.name.trim())return;state.friends.push({id:Date.now(),...state.form});state.angles[Date.now()]=0;state.form={name:'',affiliation:'',mbti:'INFP',orbit:0,color:PASTEL[0]};state.screen='home';render()}}
setInterval(()=>{if(state.screen==='orbit'){state.friends.forEach(f=>state.angles[f.id]=((state.angles[f.id]||0)+ORBIT_SPEEDS[f.orbit])%360);render()}},50);
render();
</script></body></html>
